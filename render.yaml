services:
  - type: web
    name: sms1-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && python manage.py ensure_bootstrap_admin && daphne -b 0.0.0.0 -p $PORT config.asgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: BOOTSTRAP_ADMIN_USERNAME
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: sms1-web.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://sms1-web.onrender.com
      - key: TIME_ZONE
        value: Africa/Lagos
      - key: DATABASE_URL
        fromDatabase:
          name: sms1-db
          property: connectionString

databases:
  - name: sms1-db
    databaseName: sms_db
    plan: free
