<!doctype html>
{% load static %}

<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login • SMS</title>

    <!-- If you already have base_v2.css for font + resets, keep it -->
    <link rel="stylesheet" href="{% static 'store/css/base_v2.css' %}">

    <link rel="stylesheet" href="{% static 'store/css/login.css' %}">
</head>

<body class="ui login-ui">
<main class="login">
    <!-- Background layers -->
    <div class="login__bg" aria-hidden="true">
        <div class="bg__stars"></div>
        <div class="bg__rings"></div>
        <div class="bg__sweep"></div>
        <div class="bg__vignette"></div>
    </div>

    <section class="login__content" aria-label="Login">
        <!-- Title row (padlock + system name) -->
        <div class="login__brand">
            <div class="brand__icon" aria-hidden="true">
                <!-- Padlock (inline SVG) -->
                <svg viewBox="0 0 64 64" class="lock" role="img" aria-label="">
                    <defs>
                        <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0" stop-color="#ffb84a"/>
                            <stop offset="0.55" stop-color="#3aa8ff"/>
                            <stop offset="1" stop-color="#1b5cff"/>
                        </linearGradient>
                        <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0" stop-color="#bfe6ff" stop-opacity="0.55"/>
                            <stop offset="1" stop-color="#bfe6ff" stop-opacity="0"/>
                        </linearGradient>
                    </defs>

                    <path d="M20 28v-8c0-8 6-14 12-14s12 6 12 14v8"
                          fill="none" stroke="#cfe8ff" stroke-opacity=".9" stroke-width="5" stroke-linecap="round"/>
                    <path d="M16 28h32c3 0 6 3 6 6v18c0 5-4 9-9 9H19c-5 0-9-4-9-9V34c0-3 3-6 6-6z"
                          fill="url(#g1)"/>
                    <path d="M16 28h32c3 0 6 3 6 6v18c0 5-4 9-9 9H19c-5 0-9-4-9-9V34c0-3 3-6 6-6z"
                          fill="url(#g2)"/>
                    <path d="M32 38c-3 0-5 2-5 5 0 2 1 4 3 5v6h4v-6c2-1 3-3 3-5 0-3-2-5-5-5z"
                          fill="#0b1020" fill-opacity=".65"/>
                </svg>
            </div>

            <div class="brand__text">Store Management System</div>
        </div>

        <h1 class="login__title">Welcome</h1>
        <p class="login__subtitle">Login to continue</p>

        <!-- Django form -->
        <form class="login__form" method="post" novalidate>
            {% csrf_token %}

            <!-- Username -->
            <div class="field">
          <span class="field__icon" aria-hidden="true">
            <!-- user icon -->
            <svg viewBox="0 0 24 24" class="ico">
              <path d="M12 12c2.9 0 5-2.1 5-5s-2.1-5-5-5-5 2.1-5 5 2.1 5 5 5zm0 2c-4 0-8 2.1-8 5v2h16v-2c0-2.9-4-5-8-5z"/>
            </svg>
          </span>

                <input
                        class="field__input"
                        type="text"
                        name="username"
                        autocomplete="username"
                        placeholder="Username"
                        required
                        value="{{ form.username.value|default_if_none:'' }}"
                />
            </div>

            <!-- Password -->
            <div class="field field--password">
          <span class="field__icon" aria-hidden="true">
            <!-- lock icon -->
            <svg viewBox="0 0 24 24" class="ico">
              <path d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2zm-7-2a2 2 0 1 1 4 0v2h-4V7z"/>
            </svg>
          </span>

                <input
                        id="passwordInput"
                        class="field__input"
                        type="password"
                        name="password"
                        autocomplete="current-password"
                        placeholder="Password"
                        required
                />

                <button class="field__eye" type="button" aria-label="Toggle password" data-toggle-password>
                    <!-- eye icon -->
                    <svg viewBox="0 0 24 24" class="ico">
                        <path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
                        <circle cx="12" cy="12" r="2.2"></circle>
                    </svg>
                </button>
            </div>

            <!-- Errors -->
            {% if form.errors %}
            <div class="login__error" role="alert">
                Invalid username or password.
            </div>
            {% endif %}

            <button class="login__btn" type="submit">Log In</button>
        </form>
    </section>
</main>

<script src="{% static 'store/js/login.js' %}"></script>
</body>
</html>
